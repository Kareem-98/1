<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة زفاف كريم وسارة</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --white: #ffffff;
      --beige: #f4f1ec;
      --black: #111111;
      --gold: #c59d5f;
      --shadow: rgba(0, 0, 0, .15);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
      line-height: 1.6;
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    button {
      cursor: pointer;
      border: none;
      outline: none;
    }

    /* Intro / Envelope */
    .intro {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      perspective: 1000px;
    }
    .envelope {
      width: 280px;
      height: 180px;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .env-body,
    .env-flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, var(--beige) 0%, #e5ddce 100%);
      border-radius: 8px;
      box-shadow: 0 20px 50px var(--shadow);
    }
    .env-flap {
      clip-path: polygon(0 0, 50% 70%, 100% 0);
      transform-origin: top center;
      z-index: 2;
    }
    .env-seal {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(197, 157, 95, .4);
    }
    .env-seal i {
      color: var(--white);
      font-size: 20px;
    }
    .tap {
      margin-top: 30px;
      color: var(--gold);
      font-size: 14px;
      opacity: .8;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* Sections */
    section {
      position: relative;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 80px 20px;
      text-align: center;
    }
    .btn {
      margin-top: 25px;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--white);
      border-radius: 6px;
      font-weight: 600;
      display: inline-block;
      transition: background .3s;
    }
    .btn:hover {
      background: #b18c4f;
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-151-1519741497674-611481863552?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover no-repeat;
      position: relative;
    }
    .hero::before {
      content: '';
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, .4) 0%, rgba(0, 0, 0, .7) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
    }
    .hero h2 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 1.2rem;
      margin-bottom: 35px;
      position: relative;
    }
    .hero p::before,
    .hero p::after {
      content: '♥';
      color: var(--gold);
      margin: 0 20px;
      font-size: .7em;
    }

    /* Details Card */
    .details-card {
      background: var(--beige);
      color: var(--black);
      padding: 40px 25px;
      border-radius: 14px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 20px 50px var(--shadow);
      display: grid;
      gap: 20px;
      text-align: center;
    }
    .details-card h3 {
      margin-bottom: 25px;
      font-size: 2rem;
    }
    .details-card .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.1rem;
    }
    .details-card .row i {
      color: var(--gold);
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .countdown .box {
      background: rgba(255, 255, 255, .08);
      border-radius: 10px;
      padding: 20px 10px;
      min-width: 90px;
      text-align: center;
    }
    .countdown .box span {
      display: block;
      font-size: 2.2rem;
      font-family: 'Playfair Display', serif;
      color: var(--gold);
    }
    .countdown .box small {
      font-size: .85rem;
      color: #ccc;
    }

    /* Map */
    .map-wrapper {
      position: relative;
      height: 0;
      padding-bottom: 40%;
      border-radius: 12px;overflow: hidden;
      margin-top: 25px;
      background: #ddd;
    }
    .map-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Audio (hidden) */
    #bgMusic {
      display: none;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      .hero h2 {
        font-size: 2rem;
      }
      .details-card .row {
        display: block;
        line-height: 1.9;
      }
      .countdown .box {
        min-width: 70px;
        font-size: 1.8rem;
      }
    }
  </style>

  <!-- Audio -->
  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <!-- Intro / Envelope -->
  <div class="intro" id="intro">
    <div class="envelope" onclick="openInvite()">
      <div class="env-body"></div>
      <div class="env-flap" id="flap"></div>
      <div class="env-seal"><i class="fas fa-heart"></i></div>
      <p class="tap">انقر لفتح الدعوة</p>
    </div>
  </div>

  <!-- Main Content -->
  <main id="mainContent">
    
    <!-- Hero -->
    <section class="hero">
      <div class="hero-content">
        <h2>دعوة زفاف</h2>
        <p>كريم وسارة</p>
        <a href="#details" class="btn">عرض التفاصيل</a>
      </div>
    </section>

    <!-- Details -->
    <section id="details" class="container scroll-reveal">
      <div class="details-card">
        <h3>تفاصيل الزفاف</h3>
        <div class="row">
          <i class="fas fa-map-marker-alt"></i>
          <span>دار جاردينيا - الحرب الكيميائية</span>
        </div>
        <div class="row">
          <i class="fas fa-calendar"></i>
          <span>22 سبتمبر 2026</span>
        </div>
        <div class="row">
          <i class="fas fa-clock"></i>
          <span>8:00 مساءً</span>
        </div>
      </div>
    </section>

    <!-- Countdown -->
    <section class="container scroll-reveal">
      <h2>العد التنازلي للزفاف</h2>
      <p>ننتظركم في لحظتنا السعيدة</p>
      <div class="countdown" id="countdown">
        <div class="box"><span id="days">0</span><small>يوم</small></div>
        <div class="box"><span id="hrs">0</span><small>ساعة</small></div>
        <div class="box"><span id="mins">0</span><small>دقيقة</small></div>
        <div class="box"><span id="secs">0</span><small>ثانية</small></div>
      </div>
    </section>

    <!-- Map -->
    <section class="container scroll-reveal">
      <h2>موعد الزفاف على الخريطة</h2>
      <div class="map-wrapper">
        <iframe src="https://maps.google.com/maps?q=دار+جاردينيا+الحرب+الكيميائية&output=embed" allowfullscreen loading="lazy"></iframe>
      </div>
      <a class="btn" href="https://maps.app.goo.gl/aRjuo4SUzdaEekNc7?g_st=ac" target="_blank">افتح الخريطة</a>
    </section>
  </main>

  <script>
    gsBgMusic = document.getElementById('bgMusic');
    gsap.registerPlugin(ScrollTrigger);

    // open envelope
    function openInvite() {
      gsap.to('#flap', { duration: .8, rotateX: -140, transformOrigin:'top center', ease:'power2.inOut' });
      gsap.to('#intro', { duration: 1.2, opacity:0, delay:.8, onComplete:()=>{
        document.getElementById('intro').style.display='none';
        gsBgMusic.play();
        gsap.to('#mainContent', {opacity:1, duration:1, onStart:()=>animateSections()});
      }});
    }

    // hero fade in
    gsap.from('.hero-content', {opacity:0, y:40, duration:1.4, ease:'power3.out'});

    // scroll reveals
    function animateSections(){
      gsap.utils.toArray('.scroll-reveal').forEach(el=>{
        gsap.from(el, {
          opacity:0, y:40,
          duration:.9, ease:'power3.out',
          scrollTrigger: { trigger:el, start:'top 90%', toggleActions:'play none none reverse' }
        });
      });
    }

    // countdown
    const wedDate = new Date('Sep 22, 2026 20:00:00').getTime();
    setInterval(()=>{
      const now = new Date().getTime();
      const t = wedDate - now;
      const d = Math.floor(t/(1000*60*60*24));
      const h = Math.floor((t%(1000*60*60*24))/(1000*60*60));
      const m = Math.floor((t%(1000*60*60))/(1000*60));
      const s = Math.floor((t%(1000*60))/1000);
      document.getElementById('days').textContent=String(d);
      document.getElementById('hrs').textContent=String(h).padStart(2,'0');
      document.getElementById('mins').textContent=String(m).padStart(2,'0');
      document.getElementById('secs').textContent=String(s).padStart(2,'0');
    }, 1000);
  </script>
</body>
</html>
